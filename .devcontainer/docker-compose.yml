# docker-compose.yml - ILERNA IA PAC DES
# Puertos externos en rango 10000+ para evitar conflictos en Codespaces

volumes:
  redpanda-data:
  influxdb-data:
  minio-data:
  grafana-data:


networks:
  ilerna_ia_big_data:
    driver: bridge

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ..:/workspaces:cached
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    networks:
      - ilerna_ia_big_data
    ports:
      - "18000:8000" # FastAPI
      - "18501:8501" # Streamlit
      - "18888:8888" # JupyterLab
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 1. Ingesta: MQTT
  mosquitto:
    image: eclipse-mosquitto:2
    hostname: mosquitto
    restart: unless-stopped
    ports:
      - "11883:1883"
    volumes:
      - ../config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - ilerna_ia_big_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. Ingesta intermedia: Redpanda (Kafka API)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.3.10
    hostname: redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:19092
    ports:
      - "19092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ilerna_ia_big_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2b. Consola web para tópicos y mensajes de Redpanda
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.5.3
    hostname: redpanda-console
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      KAFKA_BROKERS: "redpanda:29092"
    networks:
      - ilerna_ia_big_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3a. Procesamiento: Apache Flink (JobManager)
  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.jobmanager
    hostname: jobmanager
    restart: unless-stopped
    ports:
      - "18081:8081"
    command: jobmanager
    environment:
      - PYTHONPATH=/opt/flink/opt/python/pyflink_pkg
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1024m
        rest.port: 8081
        rest.bind-address: 0.0.0.0
    volumes:
      - ../jobs:/opt/flink/jobs
    healthcheck:
      test: ["CMD", "pgrep", "-f", "jobmanager"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ilerna_ia_big_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3b. Procesamiento: Apache Flink (TaskManager)
  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.jobmanager
    hostname: taskmanager
    restart: unless-stopped
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - PYTHONPATH=/opt/flink/opt/python/pyflink_pkg
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 6
        taskmanager.memory.process.size: 2048m
    volumes:
      - ../jobs:/opt/flink/jobs
    healthcheck:
      test: ["CMD", "pgrep", "-f", "taskmanager"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ilerna_ia_big_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 4. Almacenamiento Tiempo Real: InfluxDB
  influxdb:
    image: influxdb:2
    hostname: influxdb
    restart: unless-stopped
    ports:
      - "18086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=Ilerna_Programaci0n
      - DOCKER_INFLUXDB_INIT_ORG=ilerna
      - DOCKER_INFLUXDB_INIT_BUCKET=sensores
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=supersecrettoken
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ilerna_ia_big_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 5. Almacenamiento Histórico: MinIO (S3)
  minio:
    image: minio/minio:latest
    hostname: minio
    restart: unless-stopped
    ports:
      - "19000:9000" # S3 API
      - "19001:9001" # WebUI Console
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=Ilerna_Programaci0n
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ilerna_ia_big_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 6. Servicio UI / Monitorización: Grafana
  grafana:
    image: grafana/grafana:12.2.7
    hostname: grafana
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=Ilerna_Programaci0n
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - ilerna_ia_big_data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"