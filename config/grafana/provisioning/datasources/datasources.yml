apiVersion: 1

deleteDatasources:
  - name: Infinity
    orgId: 1

datasources:
  - name: InfluxDB
    uid: influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: true
    jsonData:
      version: Flux
      organization: ilerna
      defaultBucket: sensores
      tlsSkipVerify: true
    secureJsonData:
      token: supersecrettoken

  - name: Infinity
    uid: infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    editable: true
    jsonData:
      allowedHosts:
        - http://redpanda:9644
        - http://redpanda:8082
        - http://jobmanager:8081
        - http://workspace:8000
